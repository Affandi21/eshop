<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Car</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>

        body{
            background:#f8fafc;
            font-family:'Inter',sans-serif;
        }

        .form-card{
            border:none;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.05);
            padding:2.5rem;
            background:white;
        }

    </style>

</head>

<body>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card form-card">

                <h3 class="fw-bold mb-4">Create New Car</h3>

                <form th:action="@{/car/createCar}" th:object="${car}" method="post">

                    <div class="mb-3">

                        <label class="form-label">Car Name</label>

                        <input th:field="*{carName}"
                               type="text"
                               class="form-control"
                               placeholder="Enter car name">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">Car Color</label>

                        <input th:field="*{carColor}"
                               type="text"
                               class="form-control"
                               placeholder="Enter car color">

                    </div>

                    <div class="mb-4">

                        <label class="form-label">Quantity</label>

                        <input th:field="*{carQuantity}"
                               type="number"
                               class="form-control"
                               placeholder="Enter quantity">

                    </div>

                    <button class="btn btn-primary w-100">

                        <i class="fas fa-plus me-1"></i>
                        Create Car

                    </button>

                </form>

                <div class="mt-3 text-center">

                    <a th:href="@{/car/listCar}"
                       class="btn btn-outline-secondary">

                        <i class="fas fa-arrow-left"></i>
                        Back

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
