<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Order History</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>

        body{background:#f8fafc}

        .btn-back{border-radius:10px;padding:8px 16px}

    </style>

</head>

<body>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2 class="fw-bold">Order History</h2>

        <a th:href="@{/order/create}" class="btn btn-primary">
            <i class="fas fa-plus me-1"></i>Create Order
        </a>

    </div>

    <form th:action="@{/order/history}" method="post" class="mb-4">

        <input type="text"
               class="form-control"
               name="author"
               placeholder="Search by author">

    </form>

    <table class="table table-bordered">

        <thead>

        <tr>
            <th>Order ID</th>
            <th>Author</th>
            <th>Status</th>
            <th class="text-center">Payment</th>
        </tr>

        </thead>

        <tbody>

        <tr th:each="order : ${orders}">

            <td th:text="${order.id}"></td>
            <td th:text="${order.author}"></td>
            <td th:text="${order.status}"></td>

            <td class="text-center">

                <a th:href="@{/order/pay/{id}(id=${order.id})}"
                   class="btn btn-primary btn-sm px-4">

                    <i class="fas fa-credit-card me-1"></i>Pay

                </a>

            </td>

        </tr>

        </tbody>

    </table>

    <div class="mt-4">

        <a th:href="@{/}" class="btn btn-outline-secondary btn-back">

            <i class="fas fa-arrow-left me-1"></i>Back

        </a>

    </div>

</div>

</body>
</html>
