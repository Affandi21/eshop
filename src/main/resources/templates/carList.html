<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Car Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>

        body{
            background:#f8fafc;
            font-family:'Inter',sans-serif;
        }

        .dashboard-card{
            border-radius:16px;
            border:none;
            box-shadow:0 10px 30px rgba(0,0,0,0.05);
        }

        .table thead{
            background:#f1f5f9;
        }

    </style>

</head>

<body>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h2 class="fw-bold">Car Inventory</h2>
            <p class="text-muted">Manage available cars</p>

        </div>

        <a th:href="@{/car/createCar}" class="btn btn-primary">

            <i class="fas fa-plus me-1"></i>
            Create Car

        </a>

    </div>

    <div class="card dashboard-card">

        <div class="table-responsive">

            <table class="table mb-0">

                <thead>

                <tr>

                    <th class="ps-4">Car Name</th>
                    <th>Color</th>
                    <th>Quantity</th>
                    <th class="text-center">Action</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="car : ${cars}">

                    <td class="ps-4 fw-semibold" th:text="${car.carName}"></td>

                    <td th:text="${car.carColor}"></td>

                    <td>

                        <span class="badge bg-primary bg-opacity-10 text-primary px-3 py-2"
                              th:text="${car.carQuantity}"></span>

                    </td>

                    <td class="text-center">

                        <div class="btn-group">

                            <!-- EDIT BUTTON (FIXED) -->
                            <a th:href="@{/car/editCar/{carId}(carId=${car.carId})}"
                               class="btn btn-sm btn-outline-warning">

                                <i class="fas fa-edit"></i>

                            </a>

                            <!-- DELETE BUTTON -->
                            <form th:action="@{/car/deleteCar}" method="post">

                                <input type="hidden" name="carId" th:value="${car.carId}">

                                <button class="btn btn-sm btn-outline-danger"
                                        onclick="return confirm('Delete this car?')">

                                    <i class="fas fa-trash"></i>

                                </button>

                            </form>

                        </div>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

    <div class="mt-4">

        <a th:href="@{/}" class="btn btn-outline-secondary">

            <i class="fas fa-arrow-left me-1"></i>
            Back to Home

        </a>

    </div>

</div>

</body>
</html>
