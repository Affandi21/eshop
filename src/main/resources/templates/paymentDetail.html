<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Payment Detail</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body{background:#f8fafc}
    </style>

</head>

<body>

<div class="container mt-5">

    <h2 class="fw-bold mb-4">Payment Detail</h2>

    <div class="card p-4">

        <p><strong>Payment ID:</strong> <span th:text="${payment.id}"></span></p>

        <p><strong>Method:</strong> <span th:text="${payment.method}"></span></p>

        <p><strong>Status:</strong> <span th:text="${payment.status}"></span></p>

    </div>

    <div class="mt-4">

        <a th:href="@{/order/history}" class="btn btn-outline-secondary">

            <i class="fas fa-arrow-left me-1"></i>
            Back

        </a>

    </div>

</div>

</body>
</html>
