<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>Payment Detail</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background:#f8fafc">

<div class="container mt-5">

    <h2 class="fw-bold mb-4">Payment Detail</h2>

    <div class="card p-4">

        <p><strong>Payment ID:</strong> <span th:text="${payment.id}"></span></p>

        <p><strong>Method:</strong> <span th:text="${payment.method}"></span></p>

        <p><strong>Status:</strong> <span th:text="${payment.status}"></span></p>

    </div>

</div>

</body>

</html>
