<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pay Order</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body{background:#f8fafc}
    </style>

</head>

<body>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card p-4 shadow">

                <h3 class="fw-bold mb-3">Pay Order</h3>

                <form th:action="@{/order/pay/{id}(id=${order.id})}" method="post">

                    <label class="form-label">Payment Method</label>

                    <select name="method" class="form-control mb-3">

                        <option value="VOUCHER">Voucher</option>
                        <option value="COD">Cash On Delivery</option>

                    </select>

                    <label class="form-label">Voucher Code</label>

                    <input type="text"
                           name="voucherCode"
                           class="form-control mb-3">

                    <button class="btn btn-primary w-100">

                        <i class="fas fa-credit-card me-1"></i>
                        Pay Order

                    </button>

                </form>

                <div class="mt-3 text-center">

                    <a th:href="@{/order/history}" class="btn btn-outline-secondary">

                        <i class="fas fa-arrow-left me-1"></i>
                        Back

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
